name: daily-update
# 사이트별 수집 cron은 20분씩 어긋나게 배치한다 (무료 빌드 동시성 1개 → 새벽 몰림 방지).
#   ijacalc 05:30 · naebaeka 05:50 · 이후 사이트 06:10, 06:30 …
on:
  schedule:
    - cron: '50 20 * * *'   # 05:50 KST (ijacalc 05:30과 20분 간격)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # 수집 실패(해외 IP 차단 등)해도 기존 courses-all.json으로 빌드 계속
      - name: Collect
        run: node scripts/collect.js 1500 1 || echo "collect failed - using existing data"
      - name: Build
        run: node scripts/build-pages.js
      - name: Commit & push
        run: |
          git config user.name "naebaeka-bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "daily update $(date -u +%Y-%m-%d)"
          git push
