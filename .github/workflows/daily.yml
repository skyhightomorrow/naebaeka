name: daily-update
# 사이트별 수집 cron은 20분씩 어긋나게 배치한다 (무료 빌드 동시성 1개 → 새벽 몰림 방지).
#   ijacalc 05:30 · naebaeka 05:50 · 이후 사이트 06:10, 06:30 …
on:
  schedule:
    - cron: '50 20 * * *'   # 05:50 KST (ijacalc 05:30과 20분 간격)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # 잡 전체 백스톱 — 어느 스텝이든 매달리면 강제 종료(2026-07-13 collect 무한대기로 3시간 in_progress 사고 방지)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # 수집이 매달려도(네트워크 스톨 등) 20분 후 종료하고 기존 courses-all.json으로 빌드 계속.
      # ⚠️ `|| echo` 는 비정상 '종료'만 잡음 — 프로세스가 hang하면 exit가 안 나 폴백이 안 걸리므로 timeout 필수.
      - name: Collect
        run: timeout 20m node scripts/collect.js 1500 1 || echo "collect failed/timeout - using existing data"
      - name: Build
        run: node scripts/build-pages.js
      - name: Commit & push
        run: |
          git config user.name "naebaeka-bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "daily update $(date -u +%Y-%m-%d)"
          git push
