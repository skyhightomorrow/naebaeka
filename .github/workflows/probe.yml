name: probe-work24
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch one work24 page from GitHub IP
        run: |
          echo "runner public IP:"; curl -s https://api.ipify.org; echo
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          URL="https://www.work24.go.kr/hr/a/a/1100/trnnCrsInf.do?dghtSe=A&traingMthCd=M1001&tracseTme=1&startDate=20260713&endDate=20270713&pageSize=10&pageIndex=1&srchType=all_type&currentTab=1&action=trnnCrsInfPost.do"
          CODE=$(curl -s -A "$UA" -o page.html -w "%{http_code}" "$URL")
          echo "HTTP status: $CODE"
          echo "bytes: $(wc -c < page.html)"
          echo "course cards: $(grep -c 'data-tracseid' page.html)"
          echo "총건수: $(grep -oE '총&nbsp;<span[^>]*>[0-9,]+</span>건' page.html | head -1)"
          echo "--- 차단 흔적 검사 ---"
          grep -oiE 'access denied|edgesuite|blocked|접근이 제한|비정상' page.html | head -3 || echo "(차단 문구 없음)"
